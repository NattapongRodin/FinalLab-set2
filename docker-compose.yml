services:
  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  task-db:
    image: postgres:15
    container_name: task-db
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"
    volumes:
      - task_db_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5435:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      DATABASE_URL: postgres://admin:secret@auth-db:5432/authdb
      JWT_SECRET: dev-shared-secret
      JWT_EXPIRES_IN: 1h
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      - auth-db
    restart: unless-stopped

  task-service:
    build: ./task-service
    container_name: task-service
    environment:
      DATABASE_URL: postgres://admin:secret@task-db:5432/taskdb
      JWT_SECRET: dev-shared-secret
      PORT: 3002
      NODE_ENV: development
    ports:
      - "3002:3002"
    depends_on:
      - task-db
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      DATABASE_URL: postgres://admin:secret@user-db:5432/userdb
      JWT_SECRET: dev-shared-secret
      PORT: 3003
      NODE_ENV: development
    ports:
      - "3003:3003"
    depends_on:
      - user-db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - task-service
      - user-service
    restart: unless-stopped

volumes:
  auth_db_data:
  task_db_data:
  user_db_data: