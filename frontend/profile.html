<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>👤 Profile — Final Lab Set 2</title>
</head>
<body>

<h2>👤 My Profile</h2>

<div>
  <label>Display Name:</label><br>
  <input type="text" id="display_name" placeholder="ชื่อที่แสดง"><br><br>

  <label>Bio:</label><br>
  <textarea id="bio" placeholder="แนะนำตัว"></textarea><br><br>

  <button onclick="updateProfile()">💾 Save</button>
</div>

<hr>

<h3>🔎 Debug Info</h3>
<pre id="debug"></pre>

<script src="config.js"></script>
<script>

const USER = window.APP_CONFIG.USER_URL;
const token = localStorage.getItem('jwt_token');

// โหลดข้อมูล
async function loadProfile() {
  try {

    const res  = await fetch(`${USER}/api/users/me`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    // debug
    document.getElementById('debug').innerText = JSON.stringify(data, null, 2);

    if (!res.ok) {
      alert('โหลดข้อมูลไม่ได้');
      return;
    }

    document.getElementById('display_name').value = data.profile.display_name || '';
    document.getElementById('bio').value = data.profile.bio || '';

  } catch (err) {
    console.error(err);
    alert('error โหลด profile');
  }
}

// อัปเดตข้อมูล
async function updateProfile() {
  try {

    const display_name = document.getElementById('display_name').value;
    const bio = document.getElementById('bio').value;

    const res = await fetch(`${USER}/api/users/me`, {
      method: 'PUT',
      headers: {
        Authorization: `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ display_name, bio })
    });

    const data = await res.json();

    if (res.ok) {
      alert('อัปเดตสำเร็จ!');
      loadProfile(); // reload
    } else {
      alert('อัปเดตไม่สำเร็จ');
    }

  } catch (err) {
    console.error(err);
    alert('error update');
  }
}

loadProfile();

</script>

</body>
</html>
